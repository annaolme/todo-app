<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>My Todos</h1>
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="Add a new todo...">
            <button onclick="addTodo()">Add</button>
        </div>
        <div class="filters">
            <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
            <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
            <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
        </div>
        <ul id="todo-list"></ul>
        <div class="footer">
            <span id="counter">0 items left</span>
            <button class="clear-btn" onclick="clearCompleted()">Clear completed</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
